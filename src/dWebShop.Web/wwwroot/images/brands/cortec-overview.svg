<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" preserveAspectRatio="xMidYMid slice" role="img" aria-labelledby="t">
  <title id="t">CORTEC VpCI — molekularna zaštita metala</title>
  <defs>
    <linearGradient id="bg-c" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f4f1ea"/>
      <stop offset="1" stop-color="#dcd6c5"/>
    </linearGradient>
    <pattern id="steel" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#16161a" stroke-width=".5" stroke-opacity=".25"/>
    </pattern>
    <radialGradient id="vp-glow" cx=".5" cy=".5" r=".5">
      <stop offset="0" stop-color="#2e8b4a" stop-opacity=".55"/>
      <stop offset="1" stop-color="#2e8b4a" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="800" height="600" fill="url(#bg-c)"/>

  <!-- container outline (sealed enclosure) -->
  <g stroke="#16161a" stroke-width="1.6" stroke-linejoin="round" fill="none">
    <rect x="80" y="100" width="640" height="420" stroke-dasharray="8 6"/>
  </g>

  <!-- VpCI emitter pouch -->
  <g transform="translate(120 360)">
    <rect x="0" y="0" width="80" height="100" fill="#1a5c2e" stroke="#16161a" stroke-width="1.4"/>
    <rect x="6" y="6" width="68" height="14" fill="#f4f1ea" stroke="#16161a" stroke-width=".6"/>
    <text x="40" y="16" font-family="ui-monospace,monospace" font-size="9" text-anchor="middle" fill="#16161a">VpCI-126</text>
    <g fill="#f4f1ea" font-family="ui-monospace,monospace" font-size="22" font-weight="700">
      <text x="40" y="70" text-anchor="middle">VpCI</text>
    </g>
  </g>

  <!-- vapor cloud (radial glow) -->
  <ellipse cx="400" cy="310" rx="320" ry="170" fill="url(#vp-glow)"/>

  <!-- VpCI molecules floating -->
  <g stroke="#1a5c2e" stroke-width="1" fill="#2e8b4a">
    <g transform="translate(260 200)">
      <circle r="6"/><circle cx="12" cy="-6" r="4"/><circle cx="-10" cy="-8" r="4"/>
      <line x1="0" y1="0" x2="12" y2="-6"/><line x1="0" y1="0" x2="-10" y2="-8"/>
    </g>
    <g transform="translate(360 160)">
      <circle r="6"/><circle cx="12" cy="-6" r="4"/><circle cx="-10" cy="-8" r="4"/>
      <line x1="0" y1="0" x2="12" y2="-6"/><line x1="0" y1="0" x2="-10" y2="-8"/>
    </g>
    <g transform="translate(450 220)">
      <circle r="6"/><circle cx="12" cy="-6" r="4"/><circle cx="-10" cy="-8" r="4"/>
      <line x1="0" y1="0" x2="12" y2="-6"/><line x1="0" y1="0" x2="-10" y2="-8"/>
    </g>
    <g transform="translate(540 180)">
      <circle r="6"/><circle cx="12" cy="-6" r="4"/><circle cx="-10" cy="-8" r="4"/>
      <line x1="0" y1="0" x2="12" y2="-6"/><line x1="0" y1="0" x2="-10" y2="-8"/>
    </g>
    <g transform="translate(310 300)">
      <circle r="6"/><circle cx="12" cy="-6" r="4"/><circle cx="-10" cy="-8" r="4"/>
      <line x1="0" y1="0" x2="12" y2="-6"/><line x1="0" y1="0" x2="-10" y2="-8"/>
    </g>
    <g transform="translate(430 320)">
      <circle r="6"/><circle cx="12" cy="-6" r="4"/><circle cx="-10" cy="-8" r="4"/>
      <line x1="0" y1="0" x2="12" y2="-6"/><line x1="0" y1="0" x2="-10" y2="-8"/>
    </g>
    <g transform="translate(560 280)">
      <circle r="6"/><circle cx="12" cy="-6" r="4"/><circle cx="-10" cy="-8" r="4"/>
      <line x1="0" y1="0" x2="12" y2="-6"/><line x1="0" y1="0" x2="-10" y2="-8"/>
    </g>
    <g transform="translate(620 200)">
      <circle r="6"/><circle cx="12" cy="-6" r="4"/><circle cx="-10" cy="-8" r="4"/>
      <line x1="0" y1="0" x2="12" y2="-6"/><line x1="0" y1="0" x2="-10" y2="-8"/>
    </g>
  </g>

  <!-- vapor trail arrows from pouch -->
  <g stroke="#1a5c2e" stroke-width="1.2" fill="none" stroke-opacity=".6">
    <path d="M180 360 Q220 300 280 280" stroke-dasharray="3 4"/>
    <path d="M180 380 Q260 360 320 320" stroke-dasharray="3 4"/>
    <path d="M180 400 Q280 410 360 400" stroke-dasharray="3 4"/>
  </g>

  <!-- metal parts being protected -->
  <g stroke="#16161a" stroke-width="1.4" stroke-linejoin="round">
    <!-- bolt -->
    <g transform="translate(290 440)">
      <polygon points="0,0 20,-12 40,0 40,16 20,28 0,16"/>
      <rect x="14" y="16" width="12" height="40" fill="#a8a8a8"/>
      <g fill="#a8a8a8" stroke="#16161a" stroke-width="1">
        <polygon points="0,0 20,-12 40,0 40,16 20,28 0,16"/>
        <polygon points="0,0 20,-12 40,0 40,16 20,28 0,16" fill="url(#steel)"/>
      </g>
    </g>
    <!-- gear -->
    <g transform="translate(450 470)" fill="#a8a8a8">
      <circle r="34"/>
      <g stroke="#16161a" stroke-width="1">
        <rect x="-4" y="-46" width="8" height="14"/>
        <rect x="-4" y="32" width="8" height="14"/>
        <rect x="32" y="-4" width="14" height="8"/>
        <rect x="-46" y="-4" width="14" height="8"/>
        <rect x="22" y="-30" width="10" height="10" transform="rotate(45 27 -25)"/>
        <rect x="-32" y="-30" width="10" height="10" transform="rotate(-45 -27 -25)"/>
        <rect x="22" y="20" width="10" height="10" transform="rotate(-45 27 25)"/>
        <rect x="-32" y="20" width="10" height="10" transform="rotate(45 -27 25)"/>
      </g>
      <circle r="34" fill="url(#steel)"/>
      <circle r="34" fill="none" stroke="#16161a" stroke-width="1.4"/>
      <circle r="10" fill="#dcd6c5" stroke="#16161a" stroke-width="1"/>
    </g>
    <!-- pipe section -->
    <g transform="translate(580 450)">
      <rect x="0" y="0" width="100" height="50" fill="#a8a8a8"/>
      <rect x="0" y="0" width="100" height="50" fill="url(#steel)"/>
      <rect x="0" y="0" width="100" height="50" fill="none" stroke="#16161a" stroke-width="1.4"/>
      <ellipse cx="0" cy="25" rx="6" ry="25" fill="#909090" stroke="#16161a" stroke-width="1.2"/>
      <ellipse cx="100" cy="25" rx="6" ry="25" fill="#dcd6c5" stroke="#16161a" stroke-width="1.2"/>
    </g>
  </g>

  <!-- VpCI molecular layer on top of metal (sparkles) -->
  <g fill="#2e8b4a" stroke="#1a5c2e" stroke-width=".6">
    <circle cx="310" cy="438" r="2.4"/><circle cx="320" cy="436" r="2"/><circle cx="295" cy="442" r="2"/>
    <circle cx="450" cy="430" r="2.4"/><circle cx="460" cy="436" r="2"/><circle cx="442" cy="432" r="2"/>
    <circle cx="595" cy="447" r="2.4"/><circle cx="612" cy="448" r="2"/><circle cx="660" cy="446" r="2"/>
  </g>

  <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11" fill="#16161a" fill-opacity=".7" letter-spacing="1.5">
    <text x="40" y="50">FIG. 03 — CORTEC VpCI® ZAŠTITNI MEHANIZAM</text>
    <text x="40" y="565">VpCI EMITER → ISPARLJIVE MOLEKULE → MONOMOLEKULARNI SLOJ NA METALU</text>
  </g>
</svg>
