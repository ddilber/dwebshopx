<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" preserveAspectRatio="xMidYMid slice" role="img" aria-labelledby="t">
  <title id="t">STO — javni objekti</title>
  <defs>
    <pattern id="hatch-pub" width="14" height="14" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="14" stroke="#00457C" stroke-width="1" stroke-opacity=".22"/>
    </pattern>
    <linearGradient id="sky-pub" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f4f1ea"/>
      <stop offset="1" stop-color="#e8e3d8"/>
    </linearGradient>
  </defs>
  <rect width="800" height="600" fill="url(#sky-pub)"/>

  <line x1="0" y1="510" x2="800" y2="510" stroke="#16161a" stroke-width="1"/>
  <rect x="0" y="510" width="800" height="90" fill="url(#hatch-pub)"/>

  <!-- Wide institutional building (school) -->
  <g stroke="#16161a" stroke-width="1.4" stroke-linejoin="round">
    <!-- main body -->
    <rect x="90" y="240" width="620" height="270" fill="#00457C"/>
    <!-- roof band -->
    <rect x="80" y="230" width="640" height="22" fill="#0073CF"/>
    <!-- pediment center -->
    <polygon points="340,180 460,180 470,230 330,230" fill="#0073CF"/>
    <polygon points="340,180 460,180 400,140" fill="#00457C"/>
    <!-- clock circle -->
    <circle cx="400" cy="200" r="14" fill="#f4f1ea" stroke="#16161a" stroke-width="1.2"/>
    <line x1="400" y1="200" x2="400" y2="190" stroke="#16161a"/>
    <line x1="400" y1="200" x2="408" y2="200" stroke="#16161a"/>

    <!-- columns row -->
    <g fill="#f4f1ea">
      <rect x="110" y="266" width="14" height="244"/>
      <rect x="172" y="266" width="14" height="244"/>
      <rect x="234" y="266" width="14" height="244"/>
      <rect x="296" y="266" width="14" height="244"/>
      <rect x="358" y="266" width="14" height="244"/>
      <rect x="420" y="266" width="14" height="244"/>
      <rect x="482" y="266" width="14" height="244"/>
      <rect x="544" y="266" width="14" height="244"/>
      <rect x="606" y="266" width="14" height="244"/>
      <rect x="668" y="266" width="14" height="244"/>
    </g>

    <!-- window panels behind columns -->
    <g fill="#f4f1ea" fill-opacity=".75">
      <rect x="128" y="280" width="42" height="80"/>
      <rect x="190" y="280" width="42" height="80"/>
      <rect x="252" y="280" width="42" height="80"/>
      <rect x="314" y="280" width="42" height="80"/>
      <rect x="376" y="280" width="42" height="80"/>
      <rect x="438" y="280" width="42" height="80"/>
      <rect x="500" y="280" width="42" height="80"/>
      <rect x="562" y="280" width="42" height="80"/>
      <rect x="624" y="280" width="42" height="80"/>
    </g>

    <!-- entrance steps -->
    <rect x="350" y="450" width="100" height="60" fill="#0073CF"/>
    <line x1="350" y1="470" x2="450" y2="470" stroke="#16161a" stroke-width=".8"/>
    <line x1="350" y1="490" x2="450" y2="490" stroke="#16161a" stroke-width=".8"/>
  </g>

  <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11" fill="#16161a" fill-opacity=".7" letter-spacing="1.5">
    <text x="40" y="50">FIG. — JAVNI OBJEKTI</text>
    <text x="40" y="565">ŠKOLE · BOLNICE · INSTITUCIJE · DUGOTRAJNA ZAŠTITA</text>
  </g>
</svg>
