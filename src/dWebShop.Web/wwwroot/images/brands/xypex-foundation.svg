<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" preserveAspectRatio="xMidYMid slice" role="img" aria-labelledby="t">
  <title id="t">XYPEX — temelji i podzemni objekti</title>
  <defs>
    <pattern id="concrete-f" width="6" height="6" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r=".7" fill="#16161a" fill-opacity=".22"/>
    </pattern>
    <pattern id="soil-f" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="3" cy="6" r="1.4" fill="#8a7a5a" fill-opacity=".6"/>
      <circle cx="14" cy="14" r="1.8" fill="#8a7a5a" fill-opacity=".5"/>
      <circle cx="8" cy="16" r="1" fill="#8a7a5a" fill-opacity=".55"/>
      <circle cx="16" cy="4" r="1.2" fill="#8a7a5a" fill-opacity=".5"/>
    </pattern>
    <linearGradient id="bg-f" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f4f1ea"/>
      <stop offset="1" stop-color="#dcd6c5"/>
    </linearGradient>
  </defs>
  <rect width="800" height="600" fill="url(#bg-f)"/>

  <!-- grade line -->
  <line x1="0" y1="200" x2="800" y2="200" stroke="#16161a" stroke-width="1.2"/>

  <!-- house on grade -->
  <g stroke="#16161a" stroke-width="1.4" stroke-linejoin="round">
    <polygon points="240,80 400,40 560,80 560,200 240,200" fill="#dcd6c5"/>
    <polygon points="240,80 400,40 560,80 400,140" fill="#0073CF"/>
    <line x1="400" y1="40" x2="400" y2="200"/>
    <rect x="370" y="150" width="60" height="50" fill="#1a3c6e"/>
  </g>

  <!-- soil/earth -->
  <rect x="0" y="200" width="800" height="400" fill="#b8a37d"/>
  <rect x="0" y="200" width="800" height="400" fill="url(#soil-f)"/>

  <!-- groundwater table line -->
  <g stroke="#2e6db4" stroke-width="1.6" stroke-dasharray="6 4" opacity=".7">
    <line x1="0" y1="320" x2="180" y2="320"/>
    <line x1="620" y1="320" x2="800" y2="320"/>
  </g>
  <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="10" fill="#1a3c6e" letter-spacing="1">
    <text x="20" y="314">GWT</text>
    <text x="780" y="314" text-anchor="end">GWT</text>
  </g>

  <!-- foundation cross-section -->
  <g stroke="#16161a" stroke-width="1.6" stroke-linejoin="round">
    <!-- walls L-shape (basement) -->
    <path d="M180 200 V550 H620 V200 H560 V490 H240 V200 Z" fill="#c9c2b1"/>
    <path d="M180 200 V550 H620 V200 H560 V490 H240 V200 Z" fill="url(#concrete-f)"/>
    <!-- floor slab -->
    <rect x="240" y="450" width="320" height="40" fill="#c9c2b1"/>
    <rect x="240" y="450" width="320" height="40" fill="url(#concrete-f)"/>

    <!-- xypex coating layer (outer) — cyan band -->
    <path d="M175 200 V554 H625 V200" fill="none" stroke="#2e6db4" stroke-width="6" stroke-opacity=".75"/>

    <!-- crystals on outer face -->
    <g stroke="#1a3c6e" stroke-width=".8" fill="#2e6db4" fill-opacity=".85">
      <polygon points="174,250 184,260 174,270 164,260"/>
      <polygon points="174,330 184,340 174,350 164,340"/>
      <polygon points="174,410 184,420 174,430 164,420"/>
      <polygon points="174,490 184,500 174,510 164,500"/>
      <polygon points="626,250 636,260 626,270 616,260"/>
      <polygon points="626,330 636,340 626,350 616,340"/>
      <polygon points="626,410 636,420 626,430 616,420"/>
      <polygon points="626,490 636,500 626,510 616,500"/>
      <polygon points="320,556 330,566 320,576 310,566"/>
      <polygon points="480,556 490,566 480,576 470,566"/>
    </g>
  </g>

  <!-- water pressure arrows pushing on outer wall -->
  <g stroke="#2e6db4" stroke-width="1.4" fill="#2e6db4">
    <g transform="translate(110 340)"><line x1="0" y1="0" x2="50" y2="0" stroke-width="1.4"/><polygon points="50,0 42,-6 42,6"/></g>
    <g transform="translate(110 400)"><line x1="0" y1="0" x2="50" y2="0" stroke-width="1.4"/><polygon points="50,0 42,-6 42,6"/></g>
    <g transform="translate(110 460)"><line x1="0" y1="0" x2="50" y2="0" stroke-width="1.4"/><polygon points="50,0 42,-6 42,6"/></g>
    <g transform="translate(690 340)"><line x1="0" y1="0" x2="-50" y2="0" stroke-width="1.4"/><polygon points="-50,0 -42,-6 -42,6"/></g>
    <g transform="translate(690 400)"><line x1="0" y1="0" x2="-50" y2="0" stroke-width="1.4"/><polygon points="-50,0 -42,-6 -42,6"/></g>
    <g transform="translate(690 460)"><line x1="0" y1="0" x2="-50" y2="0" stroke-width="1.4"/><polygon points="-50,0 -42,-6 -42,6"/></g>
  </g>

  <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11" fill="#16161a" fill-opacity=".7" letter-spacing="1.5">
    <text x="40" y="50">FIG. — TEMELJI</text>
    <text x="40" y="585">PODRUMI · TEMELJNE PLOČE · ZIDOVI ISPOD GWT</text>
  </g>
</svg>
