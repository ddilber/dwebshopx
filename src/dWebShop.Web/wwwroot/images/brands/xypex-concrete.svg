<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" preserveAspectRatio="xMidYMid slice" role="img" aria-labelledby="t">
  <title id="t">XYPEX — kristalizacija u betonu</title>
  <defs>
    <pattern id="concrete-tex" width="6" height="6" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r=".8" fill="#16161a" fill-opacity=".22"/>
      <circle cx="4" cy="4" r=".5" fill="#16161a" fill-opacity=".15"/>
    </pattern>
    <linearGradient id="bg-xyp" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f4f1ea"/>
      <stop offset="1" stop-color="#dcd6c5"/>
    </linearGradient>
    <radialGradient id="glow" cx=".5" cy=".5" r=".5">
      <stop offset="0" stop-color="#2e6db4" stop-opacity=".55"/>
      <stop offset="1" stop-color="#2e6db4" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="800" height="600" fill="url(#bg-xyp)"/>

  <!-- concrete block cross-section -->
  <g transform="translate(80 80)">
    <rect x="0" y="0" width="640" height="440" fill="#c9c2b1" stroke="#16161a" stroke-width="1.6"/>
    <rect x="0" y="0" width="640" height="440" fill="url(#concrete-tex)"/>

    <!-- water (above) -->
    <g transform="translate(0 -36)">
      <path d="M0 36 Q40 16 80 36 T160 36 T240 36 T320 36 T400 36 T480 36 T560 36 T640 36 V36 Z" fill="#2e6db4" fill-opacity=".7" stroke="#16161a" stroke-width="1"/>
      <g fill="#1a3c6e" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11" font-weight="700">
        <text x="20" y="28">H₂O</text>
        <text x="120" y="20">H₂O</text>
        <text x="280" y="26">H₂O</text>
        <text x="440" y="22">H₂O</text>
        <text x="580" y="26">H₂O</text>
      </g>
    </g>

    <!-- crystal lattice — emerging crystals through concrete -->
    <g stroke="#1a3c6e" stroke-width="1.4" fill="#2e6db4" fill-opacity=".75">
      <polygon points="120,80 138,98 120,116 102,98"/>
      <polygon points="200,140 220,162 200,184 180,162"/>
      <polygon points="300,100 316,118 300,136 284,118"/>
      <polygon points="380,180 402,204 380,228 358,204"/>
      <polygon points="470,120 488,140 470,160 452,140"/>
      <polygon points="540,200 562,224 540,248 518,224"/>
      <polygon points="160,250 180,272 160,294 140,272"/>
      <polygon points="260,300 282,324 260,348 238,324"/>
      <polygon points="360,340 380,362 360,384 340,362"/>
      <polygon points="470,300 490,322 470,344 450,322"/>
      <polygon points="560,360 578,380 560,400 542,380"/>
      <polygon points="100,380 118,400 100,420 82,400"/>
      <polygon points="220,400 240,422 220,444 200,422"/>
      <polygon points="320,420 338,440 320,460 302,440"/>
      <polygon points="440,400 458,420 440,440 422,420"/>
    </g>

    <!-- connecting lines between crystals -->
    <g stroke="#1a3c6e" stroke-width=".6" stroke-opacity=".4" fill="none">
      <line x1="120" y1="98" x2="200" y2="162"/>
      <line x1="200" y1="162" x2="300" y2="118"/>
      <line x1="300" y1="118" x2="380" y2="204"/>
      <line x1="380" y1="204" x2="470" y2="140"/>
      <line x1="470" y1="140" x2="540" y2="224"/>
      <line x1="160" y1="272" x2="260" y2="324"/>
      <line x1="260" y1="324" x2="360" y2="362"/>
      <line x1="360" y1="362" x2="470" y2="322"/>
      <line x1="470" y1="322" x2="560" y2="380"/>
      <line x1="100" y1="400" x2="220" y2="422"/>
      <line x1="220" y1="422" x2="320" y2="440"/>
      <line x1="320" y1="440" x2="440" y2="420"/>
    </g>

    <!-- glow at crystal cluster -->
    <ellipse cx="320" cy="220" rx="280" ry="160" fill="url(#glow)"/>

    <!-- arrow callout -->
    <g stroke="#16161a" stroke-width="1.2" fill="none">
      <line x1="660" y1="80" x2="560" y2="160"/>
      <polygon points="560,160 572,150 568,162" fill="#16161a"/>
    </g>
    <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11" fill="#16161a" letter-spacing="1.2">
      <text x="660" y="76">KRISTALI BLOKIRAJU</text>
      <text x="660" y="92">KAPILARNE PORE</text>
    </g>
  </g>

  <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11" fill="#16161a" fill-opacity=".7" letter-spacing="1.5">
    <text x="40" y="50">FIG. 02 — XYPEX CRYSTALLINE TECHNOLOGY</text>
    <text x="40" y="565">VODA + CEMENT + XYPEX → INERTNI KRISTALI U KAPILARAMA BETONA</text>
  </g>
</svg>
