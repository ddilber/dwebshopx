<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" preserveAspectRatio="xMidYMid slice" role="img" aria-labelledby="t">
  <title id="t">CORTEC — brodogradnja i pomorska oprema</title>
  <defs>
    <linearGradient id="sky-cm" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f4f1ea"/>
      <stop offset="1" stop-color="#dcd6c5"/>
    </linearGradient>
    <linearGradient id="sea-cm" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2e6db4"/>
      <stop offset="1" stop-color="#1a3c6e"/>
    </linearGradient>
    <pattern id="steel-cm" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#f4f1ea" stroke-width=".5" stroke-opacity=".25"/>
    </pattern>
  </defs>
  <rect width="800" height="600" fill="url(#sky-cm)"/>

  <!-- sea -->
  <rect x="0" y="400" width="800" height="200" fill="url(#sea-cm)"/>
  <g stroke="#f4f1ea" stroke-opacity=".5" fill="none" stroke-width="1">
    <path d="M0 430 Q60 424 120 430 T240 430 T360 430 T480 430 T600 430 T720 430 T800 430"/>
    <path d="M0 460 Q70 454 140 460 T280 460 T420 460 T560 460 T700 460 T800 460"/>
    <path d="M0 500 Q60 494 120 500 T240 500 T360 500 T480 500 T600 500 T720 500 T800 500"/>
    <path d="M0 540 Q70 534 140 540 T280 540 T420 540 T560 540 T700 540 T800 540"/>
  </g>

  <!-- horizon line -->
  <line x1="0" y1="400" x2="800" y2="400" stroke="#16161a" stroke-width="1"/>

  <!-- distant island/coast -->
  <g fill="#a89a82" stroke="#16161a" stroke-width=".8" opacity=".7">
    <path d="M620 400 L660 376 L720 384 L770 372 L800 380 V400 Z"/>
  </g>

  <!-- ship hull -->
  <g stroke="#16161a" stroke-width="1.8" stroke-linejoin="round">
    <!-- hull -->
    <path d="M120 380 L680 380 L640 460 L160 460 Z" fill="#1a3c6e"/>
    <path d="M120 380 L680 380 L640 460 L160 460 Z" fill="url(#steel-cm)"/>
    <path d="M120 380 L680 380 L640 460 L160 460 Z" fill="none" stroke="#16161a" stroke-width="1.8"/>
    <!-- waterline stripe (red) -->
    <path d="M148 450 L652 450 L640 460 L160 460 Z" fill="#a52a2a"/>
    <!-- portholes -->
    <g fill="#dcd6c5" stroke="#16161a" stroke-width="1">
      <circle cx="200" cy="410" r="8"/>
      <circle cx="240" cy="410" r="8"/>
      <circle cx="280" cy="410" r="8"/>
      <circle cx="320" cy="410" r="8"/>
      <circle cx="360" cy="410" r="8"/>
      <circle cx="400" cy="410" r="8"/>
      <circle cx="440" cy="410" r="8"/>
      <circle cx="480" cy="410" r="8"/>
      <circle cx="520" cy="410" r="8"/>
      <circle cx="560" cy="410" r="8"/>
      <circle cx="600" cy="410" r="8"/>
    </g>

    <!-- superstructure -->
    <rect x="380" y="280" width="200" height="100" fill="#f4f1ea"/>
    <g fill="#1a3c6e">
      <rect x="396" y="296" width="36" height="30"/>
      <rect x="438" y="296" width="36" height="30"/>
      <rect x="480" y="296" width="36" height="30"/>
      <rect x="522" y="296" width="36" height="30"/>
      <rect x="396" y="336" width="36" height="30"/>
      <rect x="438" y="336" width="36" height="30"/>
      <rect x="480" y="336" width="36" height="30"/>
      <rect x="522" y="336" width="36" height="30"/>
    </g>
    <!-- bridge/wheelhouse on top -->
    <rect x="430" y="220" width="100" height="60" fill="#f4f1ea"/>
    <rect x="440" y="230" width="80" height="20" fill="#1a3c6e"/>
    <!-- mast -->
    <line x1="480" y1="220" x2="480" y2="140" stroke="#16161a" stroke-width="2"/>
    <line x1="480" y1="160" x2="500" y2="170" stroke="#16161a" stroke-width="1.4"/>
    <circle cx="480" cy="140" r="4" fill="#a52a2a"/>

    <!-- funnel -->
    <rect x="280" y="240" width="50" height="80" fill="#a52a2a"/>
    <rect x="276" y="234" width="58" height="10" fill="#1a3c6e"/>

    <!-- container stacks on deck (front) -->
    <g stroke="#16161a" stroke-width="1.2">
      <rect x="140" y="340" width="50" height="40" fill="#2e8b4a"/>
      <rect x="194" y="340" width="50" height="40" fill="#1a5c2e"/>
      <rect x="248" y="340" width="50" height="40" fill="#2e8b4a"/>
      <rect x="140" y="300" width="50" height="40" fill="#1a5c2e"/>
      <rect x="194" y="300" width="50" height="40" fill="#2e8b4a"/>
      <rect x="600" y="340" width="50" height="40" fill="#2e8b4a"/>
      <rect x="600" y="300" width="50" height="40" fill="#1a5c2e"/>
    </g>
  </g>

  <!-- VpCI molecule cloud around hull (corrosion protection) -->
  <g stroke="#1a5c2e" stroke-width=".8" fill="#2e8b4a" fill-opacity=".75">
    <g transform="translate(80 420)"><circle r="5"/><circle cx="10" cy="-5" r="3"/><circle cx="-8" cy="-6" r="3"/></g>
    <g transform="translate(700 420)"><circle r="5"/><circle cx="10" cy="-5" r="3"/><circle cx="-8" cy="-6" r="3"/></g>
    <g transform="translate(720 470)"><circle r="5"/><circle cx="10" cy="-5" r="3"/><circle cx="-8" cy="-6" r="3"/></g>
    <g transform="translate(70 480)"><circle r="5"/><circle cx="10" cy="-5" r="3"/><circle cx="-8" cy="-6" r="3"/></g>
  </g>

  <!-- callout -->
  <g stroke="#16161a" stroke-width="1.2" fill="none">
    <line x1="120" y1="180" x2="200" y2="232"/>
    <polygon points="200,232 186,228 192,242" fill="#16161a"/>
  </g>
  <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11" fill="#16161a">
    <text x="40" y="178" letter-spacing="1.2">EcoLine MAZIVA</text>
    <text x="40" y="192" letter-spacing="1.2">VpCI PREMAZI</text>
  </g>

  <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11" fill="#16161a" fill-opacity=".7" letter-spacing="1.5">
    <text x="40" y="50">FIG. — BRODOGRADNJA I MORE</text>
    <text x="40" y="585">BRODOVI · POMORSKA OPREMA · OBALNE ČELIČNE KONSTRUKCIJE</text>
  </g>
</svg>
