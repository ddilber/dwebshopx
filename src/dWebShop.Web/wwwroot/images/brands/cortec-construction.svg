<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" preserveAspectRatio="xMidYMid slice" role="img" aria-labelledby="t">
  <title id="t">CORTEC MCI — armatura u betonu</title>
  <defs>
    <linearGradient id="bg-cc" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f4f1ea"/>
      <stop offset="1" stop-color="#dcd6c5"/>
    </linearGradient>
    <pattern id="concrete-cc" width="6" height="6" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r=".7" fill="#16161a" fill-opacity=".22"/>
      <circle cx="4" cy="4" r=".5" fill="#16161a" fill-opacity=".18"/>
    </pattern>
    <pattern id="ribbed" width="20" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(20)">
      <rect width="20" height="6" fill="#9c7a4a"/>
      <line x1="0" y1="0" x2="0" y2="6" stroke="#16161a" stroke-width="1"/>
      <line x1="10" y1="0" x2="10" y2="6" stroke="#16161a" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="800" height="600" fill="url(#bg-cc)"/>

  <!-- main concrete block (cross-section of slab/wall) -->
  <g stroke="#16161a" stroke-width="1.6" stroke-linejoin="round">
    <rect x="80" y="120" width="640" height="400" fill="#c9c2b1"/>
    <rect x="80" y="120" width="640" height="400" fill="url(#concrete-cc)"/>

    <!-- horizontal rebars -->
    <g>
      <rect x="80" y="180" width="640" height="14" fill="url(#ribbed)" stroke="#16161a" stroke-width="1"/>
      <rect x="80" y="310" width="640" height="14" fill="url(#ribbed)" stroke="#16161a" stroke-width="1"/>
      <rect x="80" y="440" width="640" height="14" fill="url(#ribbed)" stroke="#16161a" stroke-width="1"/>
    </g>

    <!-- vertical stirrups -->
    <g stroke="#16161a" stroke-width="1.4" fill="none">
      <rect x="170" y="160" width="14" height="320" fill="#9c7a4a"/>
      <rect x="170" y="160" width="14" height="320" fill="url(#ribbed)"/>
      <rect x="170" y="160" width="14" height="320" fill="none" stroke="#16161a" stroke-width="1"/>
      <rect x="320" y="160" width="14" height="320" fill="#9c7a4a"/>
      <rect x="320" y="160" width="14" height="320" fill="url(#ribbed)"/>
      <rect x="320" y="160" width="14" height="320" fill="none" stroke="#16161a" stroke-width="1"/>
      <rect x="470" y="160" width="14" height="320" fill="#9c7a4a"/>
      <rect x="470" y="160" width="14" height="320" fill="url(#ribbed)"/>
      <rect x="470" y="160" width="14" height="320" fill="none" stroke="#16161a" stroke-width="1"/>
      <rect x="620" y="160" width="14" height="320" fill="#9c7a4a"/>
      <rect x="620" y="160" width="14" height="320" fill="url(#ribbed)"/>
      <rect x="620" y="160" width="14" height="320" fill="none" stroke="#16161a" stroke-width="1"/>
    </g>
  </g>

  <!-- MCI molecules migrating through concrete to rebars (green dots/cloud) -->
  <g fill="#2e8b4a" fill-opacity=".65">
    <circle cx="120" cy="160" r="4"/>
    <circle cx="150" cy="220" r="3"/>
    <circle cx="220" cy="200" r="3"/>
    <circle cx="260" cy="260" r="4"/>
    <circle cx="380" cy="200" r="3"/>
    <circle cx="420" cy="280" r="3"/>
    <circle cx="430" cy="370" r="4"/>
    <circle cx="550" cy="220" r="3"/>
    <circle cx="580" cy="380" r="3"/>
    <circle cx="660" cy="260" r="4"/>
    <circle cx="700" cy="400" r="3"/>
    <circle cx="500" cy="480" r="4"/>
    <circle cx="200" cy="380" r="3"/>
    <circle cx="280" cy="460" r="3"/>
    <circle cx="340" cy="430" r="4"/>
  </g>

  <!-- arrows showing migration -->
  <g stroke="#1a5c2e" stroke-width="1.4" fill="none" stroke-opacity=".55">
    <path d="M40 280 Q120 290 170 300" stroke-dasharray="4 4"/>
    <polygon points="170,300 156,294 158,308" fill="#1a5c2e" stroke="none"/>
    <path d="M40 380 Q120 380 170 380" stroke-dasharray="4 4"/>
    <polygon points="170,380 156,374 158,388" fill="#1a5c2e" stroke="none"/>
  </g>

  <!-- MCI label/badge -->
  <g transform="translate(40 240)" stroke="#16161a" stroke-width="1.4">
    <rect x="-40" y="-30" width="80" height="60" fill="#1a5c2e"/>
    <text x="0" y="-8" font-family="ui-monospace,monospace" font-size="14" font-weight="700" fill="#f4f1ea" text-anchor="middle" letter-spacing="2">MCI</text>
    <text x="0" y="10" font-family="ui-monospace,monospace" font-size="9" fill="#f4f1ea" text-anchor="middle">2000</text>
    <text x="0" y="24" font-family="ui-monospace,monospace" font-size="9" fill="#f4f1ea" text-anchor="middle">ADITIV</text>
  </g>

  <!-- rebar legend -->
  <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="10" fill="#16161a" letter-spacing="1">
    <line x1="700" y1="100" x2="640" y2="180" stroke="#16161a" stroke-width=".8"/>
    <text x="700" y="92">ARMATURA</text>
    <text x="700" y="106">∅ 16 mm</text>
    <line x1="700" y1="540" x2="640" y2="450" stroke="#16161a" stroke-width=".8"/>
    <text x="700" y="552">BETON C25/30</text>
  </g>

  <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11" fill="#16161a" fill-opacity=".7" letter-spacing="1.5">
    <text x="40" y="80">FIG. — GRAĐEVINARSTVO</text>
    <text x="40" y="585">MCI ADITIVI · MIGRACIJA KROZ BETON · ZAŠTITA ARMATURE</text>
  </g>
</svg>
