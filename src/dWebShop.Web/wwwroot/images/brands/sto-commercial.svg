<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" preserveAspectRatio="xMidYMid slice" role="img" aria-labelledby="t">
  <title id="t">STO — poslovni objekat</title>
  <defs>
    <pattern id="hatch-com" width="14" height="14" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="14" stroke="#00457C" stroke-width="1" stroke-opacity=".22"/>
    </pattern>
    <linearGradient id="sky-com" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f4f1ea"/>
      <stop offset="1" stop-color="#e8e3d8"/>
    </linearGradient>
  </defs>
  <rect width="800" height="600" fill="url(#sky-com)"/>

  <line x1="0" y1="520" x2="800" y2="520" stroke="#16161a" stroke-width="1"/>
  <rect x="0" y="520" width="800" height="80" fill="url(#hatch-com)"/>

