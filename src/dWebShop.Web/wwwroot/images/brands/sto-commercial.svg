      <rect x="292" y="326" width="50" height="50"/>
      <rect x="358" y="326" width="50" height="50"/>
      <rect x="160" y="392" width="50" height="50"/>
      <rect x="226" y="392" width="50" height="50"/>
      <rect x="292" y="392" width="50" height="50"/>
      <rect x="358" y="392" width="50" height="50"/>
