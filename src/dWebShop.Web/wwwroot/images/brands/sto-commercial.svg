      <rect x="445" y="455" width="20" height="20"/><rect x="475" y="455" width="20" height="20"/><rect x="505" y="455" width="20" height="20"/><rect x="535" y="455" width="20" height="20"/><rect x="565" y="455" width="20" height="20"/><rect x="595" y="455" width="20" height="20"/>
