      <rect x="445" y="215" width="20" height="20"/><rect x="475" y="215" width="20" height="20"/><rect x="505" y="215" width="20" height="20"/><rect x="535" y="215" width="20" height="20"/><rect x="565" y="215" width="20" height="20"/><rect x="595" y="215" width="20" height="20"/>
