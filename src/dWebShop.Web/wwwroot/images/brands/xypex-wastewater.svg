<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" preserveAspectRatio="xMidYMid slice" role="img" aria-labelledby="t">
  <title id="t">XYPEX — vodoprivredni objekti / rezervoari</title>
  <defs>
    <pattern id="concrete-w" width="6" height="6" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r=".7" fill="#16161a" fill-opacity=".2"/>
    </pattern>
    <linearGradient id="bg-w" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f4f1ea"/>
      <stop offset="1" stop-color="#dcd6c5"/>
    </linearGradient>
    <linearGradient id="water-w" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2e6db4"/>
      <stop offset="1" stop-color="#1a3c6e"/>
    </linearGradient>
  </defs>
  <rect width="800" height="600" fill="url(#bg-w)"/>

  <!-- ground -->
  <line x1="0" y1="520" x2="800" y2="520" stroke="#16161a" stroke-width="1"/>

  <!-- cylindrical reservoir (perspective ellipse) -->
  <g stroke="#16161a" stroke-width="1.6" stroke-linejoin="round">
    <!-- back wall arc -->
    <path d="M180 200 a220 56 0 0 1 440 0" fill="#c9c2b1"/>
    <!-- body -->
    <path d="M180 200 V480 a220 56 0 0 0 440 0 V200" fill="#c9c2b1"/>
    <path d="M180 200 V480 a220 56 0 0 0 440 0 V200" fill="url(#concrete-w)"/>
    <!-- water inside (top ellipse) -->
    <ellipse cx="400" cy="220" rx="220" ry="56" fill="url(#water-w)"/>
    <ellipse cx="400" cy="220" rx="220" ry="56" fill="none" stroke="#16161a" stroke-width="1.2"/>

    <!-- ripple lines on water -->
    <g stroke="#f4f1ea" stroke-opacity=".55" fill="none" stroke-width="1">
      <ellipse cx="400" cy="216" rx="160" ry="40"/>
      <ellipse cx="400" cy="212" rx="100" ry="24"/>
      <ellipse cx="400" cy="208" rx="50" ry="12"/>
    </g>

    <!-- inlet pipe -->
    <rect x="60" y="240" width="120" height="36" fill="#1a3c6e"/>
    <rect x="60" y="240" width="120" height="36" fill="none" stroke="#16161a" stroke-width="1.2"/>
    <!-- valve -->
    <circle cx="120" cy="220" r="14" fill="#c9c2b1" stroke="#16161a" stroke-width="1.2"/>
    <line x1="120" y1="208" x2="120" y2="232" stroke="#16161a"/>

    <!-- crystals on inner wall -->
    <g stroke="#1a3c6e" stroke-width=".8" fill="#2e6db4" fill-opacity=".55">
      <polygon points="220,300 232,312 220,324 208,312"/>
      <polygon points="260,360 272,372 260,384 248,372"/>
      <polygon points="240,420 252,432 240,444 228,432"/>
      <polygon points="540,310 552,322 540,334 528,322"/>
      <polygon points="580,370 592,382 580,394 568,382"/>
      <polygon points="560,430 572,442 560,454 548,442"/>
    </g>
  </g>

  <!-- callout arrow to water side -->
  <g stroke="#16161a" stroke-width="1.2" fill="none">
    <line x1="700" y1="380" x2="624" y2="380"/>
    <polygon points="624,380 638,374 638,386" fill="#16161a"/>
  </g>
  <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11" fill="#16161a">
    <text x="710" y="378" letter-spacing="1">XYPEX</text>
    <text x="710" y="392" letter-spacing="1">UNUTRAŠNJI SLOJ</text>
  </g>

  <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11" fill="#16161a" fill-opacity=".7" letter-spacing="1.5">
    <text x="40" y="50">FIG. — VODOPRIVREDA</text>
    <text x="40" y="565">REZERVOARI · NSF/ANSI 61 · PITKA VODA</text>
  </g>
</svg>
