<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" preserveAspectRatio="xMidYMid slice" role="img" aria-labelledby="t">
  <title id="t">STO ETICS — presjek fasadnog sistema</title>
  <defs>
    <pattern id="hatch-sto" width="14" height="14" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="14" stroke="#00457C" stroke-width="1.2" stroke-opacity=".18"/>
    </pattern>
    <linearGradient id="sky-sto" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f4f1ea"/>
      <stop offset="1" stop-color="#e8e3d8"/>
    </linearGradient>
  </defs>
  <rect width="800" height="600" fill="url(#sky-sto)"/>

  <!-- ground line -->
  <line x1="0" y1="520" x2="800" y2="520" stroke="#16161a" stroke-width="1"/>
  <rect x="0" y="520" width="800" height="80" fill="url(#hatch-sto)"/>

  <!-- main wall block -->
  <g transform="translate(120 90)">
    <!-- substrate -->
    <rect x="0" y="0" width="80" height="430" fill="#d9d2c1" stroke="#16161a" stroke-width="1.2"/>
    <!-- insulation board layer -->
    <rect x="80" y="0" width="60" height="430" fill="#f9d77a" stroke="#16161a" stroke-width="1.2"/>
    <!-- mesh + basecoat -->
    <rect x="140" y="0" width="22" height="430" fill="#b9a37a" stroke="#16161a" stroke-width="1.2"/>
    <!-- topcoat (sto blue) -->
    <rect x="162" y="0" width="14" height="430" fill="#00457C" stroke="#16161a" stroke-width="1.2"/>

    <!-- mesh diagonal cross-hatch on insulation -->
    <g stroke="#16161a" stroke-width=".6" stroke-opacity=".35">
      <line x1="80" y1="0" x2="140" y2="60"/>
      <line x1="80" y1="60" x2="140" y2="120"/>
      <line x1="80" y1="120" x2="140" y2="180"/>
      <line x1="80" y1="180" x2="140" y2="240"/>
      <line x1="80" y1="240" x2="140" y2="300"/>
      <line x1="80" y1="300" x2="140" y2="360"/>
      <line x1="80" y1="360" x2="140" y2="420"/>
      <line x1="140" y1="0" x2="80" y2="60"/>
      <line x1="140" y1="60" x2="80" y2="120"/>
      <line x1="140" y1="120" x2="80" y2="180"/>
      <line x1="140" y1="180" x2="80" y2="240"/>
      <line x1="140" y1="240" x2="80" y2="300"/>
      <line x1="140" y1="300" x2="80" y2="360"/>
      <line x1="140" y1="360" x2="80" y2="420"/>
    </g>

    <!-- callout numbers -->
    <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11" fill="#16161a">
      <line x1="40" y1="-20" x2="40" y2="0" stroke="#16161a" stroke-width=".8"/>
      <text x="40" y="-26" text-anchor="middle">01</text>
      <line x1="110" y1="-20" x2="110" y2="0" stroke="#16161a" stroke-width=".8"/>
      <text x="110" y="-26" text-anchor="middle">02</text>
      <line x1="151" y1="-20" x2="151" y2="0" stroke="#16161a" stroke-width=".8"/>
      <text x="151" y="-26" text-anchor="middle">03</text>
      <line x1="169" y1="-20" x2="169" y2="0" stroke="#16161a" stroke-width=".8"/>
      <text x="169" y="-26" text-anchor="middle">04</text>
    </g>
  </g>

  <!-- facade elevation on right -->
  <g transform="translate(360 90)" fill="none" stroke="#16161a" stroke-width="1.2">
    <rect x="0" y="0" width="320" height="430" fill="#00457C" fill-opacity=".88"/>
    <!-- window grid -->
    <g fill="#f4f1ea" stroke="#16161a" stroke-width="1">
      <rect x="30" y="36" width="56" height="74"/>
      <rect x="118" y="36" width="56" height="74"/>
      <rect x="206" y="36" width="56" height="74"/>
      <rect x="30" y="140" width="56" height="74"/>
      <rect x="118" y="140" width="56" height="74"/>
      <rect x="206" y="140" width="56" height="74"/>
      <rect x="30" y="244" width="56" height="74"/>
      <rect x="118" y="244" width="56" height="74"/>
      <rect x="206" y="244" width="56" height="74"/>
      <rect x="30" y="348" width="56" height="60"/>
      <rect x="118" y="348" width="56" height="60"/>
      <rect x="206" y="348" width="56" height="60"/>
    </g>
    <!-- thin separator lines -->
    <line x1="0" y1="32" x2="320" y2="32" stroke="#f4f1ea" stroke-opacity=".4"/>
    <line x1="0" y1="136" x2="320" y2="136" stroke="#f4f1ea" stroke-opacity=".4"/>
    <line x1="0" y1="240" x2="320" y2="240" stroke="#f4f1ea" stroke-opacity=".4"/>
    <line x1="0" y1="344" x2="320" y2="344" stroke="#f4f1ea" stroke-opacity=".4"/>
  </g>

  <!-- editorial label -->
  <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11" fill="#16161a" fill-opacity=".7" letter-spacing="1.5">
    <text x="40" y="40">FIG. 01 — STO ETICS / PRESJEK SISTEMA</text>
    <text x="40" y="560">01 PODLOGA · 02 IZOLACIJA · 03 BASECOAT + MREŽICA · 04 ZAVRŠNI SLOJ</text>
  </g>
</svg>
